version: 2

models:
  - name: stg_transactions__refunds
    description: ""
    columns:
      - name: refund_id
        data_type: varchar
        description: ""
        data_tests:
          - unique
          - not_null

      - name: payment_id
        data_type: varchar
        description: ""

      - name: order_id
        data_type: varchar
        description: ""
        data_tests:
          - not_null

      - name: refund_amount
        data_type: float
        description: ""
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: currency
        data_type: varchar
        description: ""
        data_tests:
          - not_null

      - name: reason
        data_type: varchar
        description: ""
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['customer_request', 'duplicate', 'fraud']

      - name: refunded_at
        data_type: timestamp_ntz
        description: ""

      - name: _source_file
        data_type: varchar
        description: ""

      - name: _loaded_at
        data_type: timestamp_ntz
        description: ""

