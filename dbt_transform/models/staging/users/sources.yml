version: 2

sources:
  - name: raw
    database: "{{ var('raw_database', 'RAW_DEV') }}"
    schema: 'user'
    description: "Raw tables for user data"
    config:
      freshness:
        warn_after:  {count: 48, period: hour}
        error_after: {count: 72, period: hour}
      loaded_at_field: _loaded_at

    tables:
      - name: customers
        description: "Raw customer records"
